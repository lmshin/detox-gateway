<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>입구 컷</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top, #2a2a2a 0%, #111 35%, #000 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(20, 20, 20, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ff3b30;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.3;
    }

    .desc {
      margin: 0 0 18px;
      color: #cfcfcf;
      line-height: 1.6;
      font-size: 15px;
    }

    .quiz-box {
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .label {
      font-size: 13px;
      color: #9e9e9e;
      margin-bottom: 8px;
    }

    .quiz {
      font-size: 20px;
      font-weight: 800;
      color: #7ee787;
      line-height: 1.5;
      word-break: keep-all;
    }

    input {
      width: 100%;
      padding: 16px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #161616;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-top: 10px;
    }

    input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #a0a0a0;
    }

    .error {
      color: #ff7b72;
      font-size: 14px;
      margin-top: 12px;
      min-height: 20px;
    }

    .success {
      color: #7ee787;
      font-size: 14px;
      margin-top: 12px;
      min-height: 20px;
    }

    .btns {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button, a.link-btn {
      flex: 1 1 180px;
      text-decoration: none;
      text-align: center;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover, a.link-btn:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: #ff3b30;
      color: #fff;
    }

    .secondary {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 18px;
      color: #8b949e;
      font-size: 12px;
      line-height: 1.5;
    }

    .small {
      font-size: 12px;
      color: #9e9e9e;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🚨 입구 컷</div>
    <h1>오늘의 알고리즘 한 줄</h1>
    <p class="desc">
      무지성 쇼츠 진입 전에 한 줄은 쳐라.<br />
      아래 문장을 <b>띄어쓰기까지 정확히</b> 입력해야 버튼이 열립니다.
    </p>

    <div class="quiz-box">
      <div class="label">오늘의 문장</div>
      <div id="quizText" class="quiz"></div>
    </div>

    <input
      id="answerInput"
      type="text"
      placeholder="여기에 그대로 입력"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
    />

    <div class="hint">대소문자/띄어쓰기까지 일치해야 통과</div>
    <div id="message" class="error"></div>

    <div class="btns">
      <button id="unlockBtn" class="primary" disabled>인증 완료 후 열기</button>
      <button id="changeQuizBtn" class="secondary">다른 문제</button>
    </div>

    <div class="small">
      열기 대상:
      <select id="targetSelect" style="margin-top:8px; width:100%; padding:12px; border-radius:12px; background:#161616; color:#fff; border:1px solid rgba(255,255,255,0.12);">
        <option value="https://www.youtube.com/">YouTube</option>
        <option value="https://www.instagram.com/">Instagram</option>
        <option value="https://m.youtube.com/shorts">YouTube Shorts</option>
      </select>
    </div>

    <div class="footer">
      팁: 이 페이지를 배포한 뒤, 휴대폰 단축어/루틴에서
      <b>유튜브 앱 실행 시 이 페이지를 먼저 열기</b>로 연결하면 됩니다.
    </div>
  </div>

  <script>
    const quizList = [
      "배열은 연속된 메모리 공간에 같은 타입의 데이터를 저장한다",
      "스택은 후입선출 구조이고 큐는 선입선출 구조이다",
      "이분 탐색은 정렬된 데이터에서만 사용할 수 있다",
      "시간 복잡도는 입력 크기에 따른 연산 횟수의 증가를 나타낸다",
      "해시 테이블은 평균적으로 빠른 탐색이 가능하다",
      "DFS는 깊이를 우선으로 탐색하고 BFS는 너비를 우선으로 탐색한다",
      "동적 계획법은 큰 문제를 작은 문제로 나누어 해결한다",
      "그리디 알고리즘은 매 순간 최선의 선택을 한다",
      "트리는 사이클이 없는 연결 그래프이다",
      "우선순위 큐는 가장 우선순위가 높은 데이터를 먼저 꺼낸다"
    ];

    const quizText = document.getElementById("quizText");
    const answerInput = document.getElementById("answerInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const changeQuizBtn = document.getElementById("changeQuizBtn");
    const message = document.getElementById("message");
    const targetSelect = document.getElementById("targetSelect");

    let currentAnswer = "";

    function pickRandomQuiz() {
      const index = Math.floor(Math.random() * quizList.length);
      currentAnswer = quizList[index];
      quizText.textContent = currentAnswer;
      answerInput.value = "";
      unlockBtn.disabled = true;
      message.textContent = "";
      message.className = "error";
      answerInput.focus();
    }

    function validateInput() {
      const userInput = answerInput.value.trim();
      const correct = currentAnswer.trim();

      if (userInput === correct) {
        unlockBtn.disabled = false;
        message.textContent = "통과. 이제 버튼이 열립니다.";
        message.className = "success";
      } else {
        unlockBtn.disabled = true;
        if (userInput.length === 0) {
          message.textContent = "";
        } else {
          message.textContent = "아직 틀렸습니다. 문장을 그대로 입력하세요.";
          message.className = "error";
        }
      }
    }

    answerInput.addEventListener("input", validateInput);

    answerInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !unlockBtn.disabled) {
        unlockBtn.click();
      }
    });

    changeQuizBtn.addEventListener("click", pickRandomQuiz);

    unlockBtn.addEventListener("click", () => {
      const url = targetSelect.value;
      window.location.href = url;
    });

    pickRandomQuiz();
  </script>
</body>
</html>
